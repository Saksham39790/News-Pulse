<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NewsPulse</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>📰 NewsPulse</h1>
    <p>Real-Time Headlines & Breaking News</p>
</header>

<section class="hero">
    <div class="hero-card">
        <h2>🔥 Trending News Worldwide</h2>
        <p>Search thousands of live articles instantly</p>
    </div>
</section>

<div class="controls">

    <input
        type="text"
        id="searchInput"
        placeholder="Search news..."
    >

    <button id="searchBtn">
        Search
    </button>

    <button onclick="viewSavedNews()">
        📚 Saved Articles
    </button>

    <button onclick="clearSavedNews()">
        🗑 Clear Saved
    </button>

    <button id="themeBtn">
        🌙 Dark Mode
    </button>

</div>

<div class="categories">

<button class="category-btn" onclick="loadCategory('general', event)">General</button>
<button class="category-btn" onclick="loadCategory('business', event)">Business</button>
<button class="category-btn" onclick="loadCategory('technology', event)">Technology</button>
<button class="category-btn" onclick="loadCategory('sports', event)">Sports</button>
<button class="category-btn" onclick="loadCategory('health', event)">Health</button>
<button class="category-btn" onclick="loadCategory('entertainment', event)">Entertainment</button>

</div>

<div id="loader"></div>

<div id="stats" class="stats"></div>

<div id="newsContainer" class="news-container"></div>

<div class="pagination">

<button id="prevBtn">
⬅ Previous
</button>

<button id="nextBtn">
Next ➡
</button>

</div>

<footer>
    <p>Developed by SAKSHAM K. NAYAK</p>
    <a
    href="https://github.com/Saksham39790"
    target="_blank"
    class="github-btn"
    >
    🔗 View My GitHub
    </a>
    
</footer>

<script src="script.js"></script>

</body>
</html>
